<!DOCTYPE html>
<html>
<head>
    <title>OMNI-BLACK HUD</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        .box { border: 1px solid #333; padding: 20px; max-width: 450px; margin: 50px auto; background: #050505; }
        select, button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; width: 90%; margin: 10px; cursor: pointer; }
        #signal { display: none; border: 2px solid #0f0; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>OMNI_SUPREME_v3</h2>
        <select id="asset">
            <option value="BTCUSDT">BITCOIN</option>
            <option value="XAUUSDT">GOLD</option>
            <option value="EURUSDT">EUR/USD</option>
            <option value="WTIUSDT">OIL</option>
        </select>
        <button onclick="scan()">RUN SURGICAL SCAN</button>
        <div id="status">Ready.</div>
        <div id="signal"></div>
    </div>

    <script>
        async function scan() {
            const sym = document.getElementById('asset').value;
            const res = await fetch('market_history.json');
            const history = await res.json();
            const liveRes = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${sym}`);
            const live = await liveRes.json();
            
            const price = parseFloat(live.price);
            const low_300 = Math.min(...history[sym].map(x => x.c));

            if (price <= low_300 * 1.008) {
                document.getElementById('signal').style.display = 'block';
                document.getElementById('signal').innerHTML = `🎯 SCALP FOUND: ${price}<br>TP: ${(price*1.01).toFixed(4)}`;
            } else {
                document.getElementById('status').innerText = "NO ENTRY: LIQUIDITY NOT SWEPT.";
            }
        }
    </script>
</body>
</html>
