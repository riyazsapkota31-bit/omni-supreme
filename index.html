<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-SUPREME // HUD</title>
    <style>
        :root { --bg: #050505; --card: #0a0a0b; --green: #00ff88; --red: #ff4444; --accent: #6366f1; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        /* Settings Drawer Styles */
        #drawer { position: fixed; right: -100%; top: 0; width: 85%; height: 100%; background: var(--card); transition: 0.4s; z-index: 100; padding: 20px; border-left: 1px solid #111; box-shadow: -10px 0 20px rgba(0,0,0,0.5); }
        #drawer.open { right: 0; }
        .input-field { background: #111; border: 1px solid #222; color: #fff; width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; }
        .save-btn { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        
        /* HUD Layout */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid #111; border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .value-box { background: #0d0d0f; padding: 15px; border-radius: 12px; }
        .label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .value { font-size: 1.2rem; font-weight: bold; }
        
        /* DXY Status Bar */
        .dxy-bar { background: #111; padding: 10px; border-radius: 50px; margin: 10px 0; border: 1px solid #222; font-size: 12px; }
        .wait-text { font-size: 4rem; font-weight: 900; color: #222; opacity: 0.8; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2 style="margin:0;">OMNI-SUPREME</h2>
            <small style="color:var(--accent);">XM EDITION | GHOST MONITOR ACTIVE</small>
        </div>
        <button onclick="toggleDrawer()" style="background:none; border:none; font-size:24px; color:#fff;">⚙️</button>
    </div>

    <div id="drawer">
        <h3>⚙️ SETTINGS <span onclick="toggleDrawer()" style="float:right; cursor:pointer;">×</span></h3>
        <label class="label">🔑 Gemini API Key</label>
        <input type="password" id="geminiKey" class="input-field" placeholder="••••••••••••">
        
        <label class="label">🤖 Telegram Bot Token</label>
        <input type="password" id="tgToken" class="input-field" placeholder="Bot Token">
        
        <label class="label">🆔 Telegram Chat ID</label>
        <input type="text" id="tgChat" class="input-field" placeholder="Chat ID">
        
        <div class="grid">
            <div>
                <label class="label">💰 Balance ($)</label>
                <input type="number" id="balance" class="input-field" placeholder="7200">
            </div>
            <div>
                <label class="label">⚠️ Risk %</label>
                <input type="number" id="risk" class="input-field" placeholder="0.5">
            </div>
        </div>
        
        <label class="label">🎯 Trading Mode</label>
        <select id="mode" class="input-field">
            <option value="SCALPING">⚡ SCALPING (1:1.5 - 1:4 RR)</option>
            <option value="DAY_TRADE">📈 DAY TRADE (STRUCTURAL)</option>
        </select>
        
        <button class="save-btn" onclick="saveSettings()">SAVE & SECURE</button>
    </div>

    <div id="main-view">
        <div class="dxy-bar" id="dxy-indicator">DXY: ANALYZING...</div>
        
        <div class="card">
            <div id="status-content">
                <div class="wait-text">WAIT</div>
                <div class="value-box" style="border: 1px solid #333;">
                    <div class="label" style="color:var(--accent);">Wait for POI Level</div>
                    <div class="value" id="poi-level">--</div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card value-box"><div class="label">Entry</div><div class="value">--</div></div>
            <div class="card value-box"><div class="label">Stop Loss</div><div class="value" style="color:var(--red);">--</div></div>
        </div>
    </div>

    <script>
        function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }

        // Persistence Logic: Saves data to LocalStorage
        function saveSettings() {
            const settings = {
                gemini: document.getElementById('geminiKey').value,
                tgToken: document.getElementById('tgToken').value,
                tgChat: document.getElementById('tgChat').value,
                balance: document.getElementById('balance').value,
                risk: document.getElementById('risk').value,
                mode: document.getElementById('mode').value
            };
            localStorage.setItem('omni_settings', JSON.stringify(settings));
            alert("Surgical Parameters Locked & Secured.");
            toggleDrawer();
        }

        // Load data on refresh
        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('omni_settings'));
            if(saved) {
                document.getElementById('geminiKey').value = saved.gemini;
                document.getElementById('tgToken').value = saved.tgToken;
                document.getElementById('tgChat').value = saved.tgChat;
                document.getElementById('balance').value = saved.balance;
                document.getElementById('risk').value = saved.risk;
                document.getElementById('mode').value = saved.mode;
            }
        };
    </script>
</body>
</html>
