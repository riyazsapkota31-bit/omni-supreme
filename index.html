<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-SUPREME HUD</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 1px solid #333; padding: 20px; margin: 10px; border-radius: 10px; }
        #status-box { font-size: 24px; font-weight: bold; background: #222; }
        .label { color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <h1>OMNI-SUPREME V2</h1>
    <div id="status-box" class="box">SCANNING...</div>
    
    <div class="box">
        <div class="label">POI TRACKING LEVEL</div>
        <div id="poi-level" style="font-size: 30px;">--.---</div>
    </div>

    <div class="box">
        <div class="label">CONFIDENCE SCORE</div>
        <div id="confidence-score">0/10</div>
    </div>

    <div id="last-sync" style="font-size: 10px; color: #444;">Last Sync: Never</div>

    <script>
        async function updateHUD() {
            try {
                // Fetching the status.json from your repository
                const url = 'status.json?t=' + Date.now();
                const response = await fetch(url);
                const data = await response.json();

                document.getElementById('status-box').innerText = data.status;
                document.getElementById('poi-level').innerText = "$" + data.poi_level;
                document.getElementById('confidence-score').innerText = data.confidence + "/10";
                document.getElementById('last-sync').innerText = "Last Sync: " + data.last_update;

                const statusBox = document.getElementById('status-box');
                if (data.status === "SIGNAL") {
                    statusBox.style.backgroundColor = "#00ff88";
                    statusBox.style.color = "#000";
                } else {
                    statusBox.style.backgroundColor = "#ffcc00";
                    statusBox.style.color = "#000";
                }
            } catch (e) {
                console.log("Awaiting first server push...");
            }
        }
        setInterval(updateHUD, 30000);
        updateHUD();
    </script>
</body>
</html>
